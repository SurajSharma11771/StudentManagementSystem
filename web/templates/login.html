<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    <div class="card p-4 shadow" style="max-width: 420px; margin:auto;">

        <h3 class="text-center mb-3">Login</h3>

        <form method="POST">

            <input type="text" name="username" class="form-control mb-2" placeholder="Username" required>

            <input type="password" name="password" class="form-control mb-3" placeholder="Password" required>

            <button class="btn btn-primary w-100 mb-3">
                Login
            </button>

        </form>

        <hr>

        <a href="/register" class="btn btn-success w-100 mb-2">
            Register Organization
        </a>

        <a href="/staff-register" class="btn btn-outline-dark w-100 mb-2">
            Staff Register
        </a>

        <a href="/teacher-register" class="btn btn-outline-dark w-100">
            Teacher Register
        </a>

    </div>
</div>

</body>
</html>
