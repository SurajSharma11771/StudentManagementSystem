<!DOCTYPE html>
<html>
<head>
    <title>Student Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <style>
        body {
            background: #f4f6f9;
        }

        .card {
            border-radius: 12px;
        }

        .btn {
            border-radius: 8px;
        }

        .table thead {
            background: #343a40;
            color: white;
        }
    </style>

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark px-3 shadow">
    <span class="navbar-brand fw-bold">🎓 Student Management System</span>
    <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
</nav>

<div class="container mt-4">

    <!-- STATS -->
    <div class="row mb-3">

        <div class="col-md-4">
            <div class="card shadow-sm p-3 text-white bg-primary">
                <h6>Total Students</h6>
                <h2>{{ total }}</h2>
            </div>
        </div>

    </div>

    <!-- ADD STUDENT -->
    <div class="card shadow-sm p-3 mb-3">

        <h5 class="mb-3">➕ Add Student</h5>

        <form action="/add" method="post" class="row g-2">

            <div class="col-md-5">
                <input type="text" name="name" class="form-control" placeholder="Student Name" required>
            </div>

            <div class="col-md-4">
                <input type="number" name="roll" class="form-control" placeholder="Roll Number" required>
            </div>

            <div class="col-md-3">
                <button class="btn btn-success w-100">Add</button>
            </div>

        </form>
    </div>

    <!-- SEARCH -->
    <div class="card shadow-sm p-3 mb-3">

        <form action="/search" method="get" class="row g-2">

            <div class="col-md-9">
                <input type="text" name="q" class="form-control" placeholder="Search student...">
            </div>

            <div class="col-md-3">
                <button class="btn btn-primary w-100">Search</button>
            </div>

        </form>

    </div>

    <!-- TABLE -->
    <div class="card shadow-sm p-3">

        <h5 class="mb-3">📋 Student List</h5>

        <table class="table table-hover align-middle">

            <thead>
                <tr>
                    <th>Name</th>
                    <th>Roll</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <tbody>
                {% for s in students %}
                <tr>
                    <td>{{ s[0] }}</td>
                    <td>{{ s[1] }}</td>

                    <td>

                        <!-- EDIT -->
                        <button class="btn btn-warning btn-sm"
                            data-bs-toggle="modal"
                            data-bs-target="#editModal"
                            onclick="setEditData('{{ s[1] }}', '{{ s[0] }}')">
                            Edit
                        </button>

                        <!-- DELETE -->
                        <a href="/delete/{{ s[1] }}" class="btn btn-danger btn-sm">
                            Delete
                        </a>

                    </td>
                </tr>
                {% endfor %}
            </tbody>

        </table>

    </div>

</div>

<!-- EDIT MODAL -->
<div class="modal fade" id="editModal">

  <div class="modal-dialog">

    <div class="modal-content">

      <form action="/update" method="post">

        <div class="modal-header">
          <h5 class="modal-title">Edit Student</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body">

          <input type="hidden" name="roll" id="editRoll">

          <label class="form-label">Name</label>
          <input type="text" name="name" id="editName" class="form-control" required>

        </div>

        <div class="modal-footer">
          <button class="btn btn-primary w-100">Update</button>
        </div>

      </form>

    </div>

  </div>

</div>

<script>
function setEditData(roll, name) {
    document.getElementById("editRoll").value = roll;
    document.getElementById("editName").value = name;
}
</script>

</body>
</html>
