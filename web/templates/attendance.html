<!DOCTYPE html>
<html>
<head>
    <title>Attendance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand">📅 Attendance Module</span>
    <a href="/" class="btn btn-secondary btn-sm">Back Dashboard</a>
</nav>

<div class="container mt-4">
    <div class="row mb-3">

    <div class="col-md-4">
        <div class="card bg-success text-white p-3 shadow-sm">
            <h6>Present</h6>
            <h2>{{ summary["Present"] }}</h2>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card bg-danger text-white p-3 shadow-sm">
            <h6>Absent</h6>
            <h2>{{ summary["Absent"] }}</h2>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card bg-warning text-dark p-3 shadow-sm">
            <h6>Leave</h6>
            <h2>{{ summary["Leave"] }}</h2>
        </div>
    </div>

</div>
    <div class="card p-3 shadow-sm mb-3">
        <h5>Mark Attendance</h5>

        <form action="/attendance/mark" method="POST" class="row g-2">

            <div class="col-md-4">
                <select name="roll" class="form-select" required>
                    {% for s in students %}
                        <option value="{{ s[1] }}">{{ s[0] }} - {{ s[1] }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="col-md-3">
                <input type="date" name="date" class="form-control" required>
            </div>

            <div class="col-md-3">
                <select name="status" class="form-select" required>
                    <option value="Present">Present</option>
                    <option value="Absent">Absent</option>
                    <option value="Leave">Leave</option>
                </select>
            </div>

            <div class="col-md-2">
                <button class="btn btn-success w-100">Save</button>
            </div>

        </form>
    </div>

    <div class="card p-3 shadow-sm">
        <h5>Attendance Records</h5>

        <table class="table table-striped">
            <thead>
                <tr>
                    <th>Student</th>
                    <th>Roll</th>
                    <th>Date</th>
                    <th>Status</th>
                </tr>
            </thead>

            <tbody>
                {% for a in attendance %}
                <tr>
                    <td>{{ a[1] }}</td>
                    <td>{{ a[2] }}</td>
                    <td>{{ a[3] }}</td>
                    <td>{{ a[4] }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

</div>

</body>
</html>
