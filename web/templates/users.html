<!DOCTYPE html>
<html>

<head>

    <title>User Management</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<h2>User Management</h2>

<a href="/" class="btn btn-secondary mb-3">
Back Dashboard
</a>

<div class="card p-3 mb-4">

<h4>Add New User</h4>

<form action="/add_user" method="POST">

<div class="row">

<div class="col">

<input
class="form-control"
name="username"
placeholder="Username"
required>

</div>

<div class="col">

<input
type="password"
class="form-control"
name="password"
placeholder="Password"
required>

</div>

<div class="col">

<select
name="role"
class="form-select">

<option value="admin">Admin</option>

<option value="staff">Staff</option>

<option value="teacher">Teacher</option>

</select>

</div>

<div class="col">

<button
class="btn btn-success w-100">

Add User

</button>

</div>

</div>

</form>

</div>

<table class="table table-bordered">

<thead>

<tr>

<th>ID</th>
<th>Username</th>
<th>Role</th>
<th>Actions</th>

</tr>

</thead>

<tbody>

{% for u in users %}

<tr>

<td>{{ u[0] }}</td>

<td>{{ u[1] }}</td>

<td>{{ u[2] }}</td>

<td>

<a
href="/delete_user/{{ u[0] }}"
class="btn btn-danger btn-sm">

Delete

</a>

</td>
</tr>

{% endfor %}

</tbody>

</table>

</div>

</body>

</html>
