<!DOCTYPE html>
<html>

<head>

    <title>Activity Logs</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-4">

    <a href="/"
       class="btn btn-secondary mb-3">
       ← Dashboard
    </a>

    <div class="card shadow">

        <div class="card-body">

            <h3 class="mb-3">
                🕒 Activity Logs
            </h3>

            <table class="table table-striped">

                <thead>

                    <tr>
                        <th>User</th>
                        <th>Action</th>
                        <th>Date</th>
                    </tr>

                </thead>

                <tbody>

                {% for log in logs %}

                    <tr>

                        <td>{{ log[0] }}</td>

                        <td>{{ log[1] }}</td>

                        <td>{{ log[2] }}</td>

                    </tr>

                {% endfor %}

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>
</html>
