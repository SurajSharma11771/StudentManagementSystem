<!DOCTYPE html>
<html>

<head>

    <title>Student Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<a href="/" class="btn btn-secondary mb-3">

← Back

</a>

<div class="card shadow">

<div class="card-body">

<h2>{{ student[1] }}</h2>

<hr>

<p><strong>Roll:</strong> {{ student[2] }}</p>

<p><strong>Email:</strong> {{ student[3] or "Not Added" }}</p>

<p><strong>Phone:</strong> {{ student[4] or "Not Added" }}</p>

<p><strong>Address:</strong> {{ student[5] or "Not Added" }}</p>

<p><strong>DOB:</strong> {{ student[6] or "Not Added" }}</p>

<p><strong>Course:</strong> {{ student[7] or "Not Added" }}</p>

<p><strong>Semester:</strong> {{ student[8] or "Not Added" }}</p>

</div>

</div>

</div>

</body>

</html>
