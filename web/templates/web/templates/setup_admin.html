<!DOCTYPE html>
<html>
<head>
    <title>Setup Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow p-4" style="max-width: 450px; margin:auto;">

        <h3 class="text-center mb-3">First Time Admin Setup</h3>

        <p class="text-muted text-center">
            Create the first admin account. This page will be available only once.
        </p>

        <form method="POST">

            <div class="mb-3">
                <input type="text" name="username" class="form-control" placeholder="Admin Username" required>
            </div>

            <div class="mb-3">
                <input type="password" name="password" class="form-control" placeholder="Admin Password" required>
            </div>

            <button class="btn btn-primary w-100">
                Create Admin
            </button>

        </form>

    </div>

</div>

</body>
</html>
